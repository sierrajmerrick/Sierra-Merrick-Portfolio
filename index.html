<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Jacquard+24&family=Press+Start+2P&display=swap");
    </style>
    <link rel="stylesheet" href="styles/generalstyles.css" />
    <title>Home</title>
  </head>
  <body>
    <header class="general-header">
      <a href="./menu.html">
        <button class="menu-button">Main Menu</button>
      </a>
    </header>
    <main>
      <section class="hero-section">
        <p>Hello, my name is:</p>
        <h1>Sierra Merrick</h1>
        <h2>Welcome to my Portfolio!</h2>
        <p>
          This is a collection of my work and projects. Feel free to explore and
          learn more about me.
        </p>
        <a href="./projects.html">
          <button class="hero-button">Press Start</button>
        </a>
      </section>
      <section class="widgets-section">
        <ul class="widgets-list">
          <li class="weather-widget">
            <h3>Weather in Missoula</h3>
            <div id="weather-output">
              <script src="./scripts/weather.js"></script>
            </div>
          </li>
          <li class="clock-widget">
            <h3>Time in Missoula</h3>
            <div id="clock">
              <div class="clock-face">
                <div class="hand hour-hand" id="hour-hand"></div>
                <div class="hand minute-hand" id="minute-hand"></div>
                <div class="hand second-hand" id="second-hand"></div>
              </div>
              <script src="./scripts/clock.js"></script>
            </div>
          </li>
          <li class="calculator-widget">
            <h3>Calculator</h3>
            <div id="calculator">
              <input
                type="text"
                id="calc-display"
                class="calc-display"
                disabled
              />
              <div class="calc-buttons">
                <button class="calc-button-clear" onclick="clearDisplay()">
                  C
                </button>
                <button
                  class="calc-button-operator"
                  onclick="appendOperation('/')"
                >
                  /
                </button>
                <button
                  class="calc-button-operator"
                  onclick="appendOperation('*')"
                >
                  *
                </button>
                <button
                  class="calc-button-operator"
                  onclick="appendOperation('-')"
                >
                  -
                </button>

                <button class="calc-button" onclick="appendNumber('7')">
                  7
                </button>
                <button class="calc-button" onclick="appendNumber('8')">
                  8
                </button>
                <button class="calc-button" onclick="appendNumber('9')">
                  9
                </button>
                <button
                  class="calc-button-operator"
                  onclick="appendOperation('+')"
                >
                  +
                </button>

                <button class="calc-button" onclick="appendNumber('4')">
                  4
                </button>
                <button class="calc-button" onclick="appendNumber('5')">
                  5
                </button>
                <button class="calc-button" onclick="appendNumber('6')">
                  6
                </button>
                <button class="calc-button-equal" onclick="calculate()">
                  =
                </button>

                <button class="calc-button" onclick="appendNumber('1')">
                  1
                </button>
                <button class="calc-button" onclick="appendNumber('2')">
                  2
                </button>
                <button class="calc-button" onclick="appendNumber('3')">
                  3
                </button>
                <button class="calc-button" onclick="appendNumber('0')">
                  0
                </button>
              </div>
              <script src="./scripts/calculator.js"></script>
            </div>
          </li>
        </ul>
      </section>
    </main>
  </body>
</html>
