    <header class="general-header">

    <main>
      <section class="contact-info-section">
        <h1>Get in touch</h1>
        <br />
        <button onclick="copyEmail(this)">Email</button>
        <div id="custom-alert" class="alert-popup">
          <p>EMAIL COPIED TO CLIPBOARD!</p>
          <button onclick="closeAlert()">OK</button>
        </div>
        <br />
        <br />
        <a href="https://github.com/sierrajmerrick">
          <button>Github</button>
        </a>
      </section>
      <!--Contact form-->
      <section class="message-section">
        <form class="contact-form">
          <h2>Send a message to the VOID!</h2>
          <p>
            ...seriously, there is no backend email service connected to my
            site.
          </p>
          <br />
          <div>
            <label for="message">Message:</label>
            <br />
            <textarea id="message" name="message" rows="5" required></textarea>
          </div>
          <br />
          <div>
            <button type="submit">Send</button>
          </div>
        </form>
      </section>
    </main>
